<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>任务拆解 — {{TITLE}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f1117;
      --surface: #1a1b26;
      --border: #2a2b3a;
      --text: #c0caf5;
      --text-dim: #565f89;
      --pending: #565f89;
      --active: #7aa2f7;
      --done: #9ece6a;
      --accent: #bb9af7;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* --- toolbar --- */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 48px; display: flex; align-items: center; gap: 12px;
      padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .toolbar h1 { font-size: 15px; font-weight: 600; color: var(--text); margin-right: auto; }
    .toolbar .legend { display: flex; gap: 14px; font-size: 12px; color: var(--text-dim); }
    .toolbar .legend span { display: flex; align-items: center; gap: 4px; }
    .toolbar .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
    .toolbar .btn-group { display: flex; gap: 0; }
    .toolbar .btn {
      padding: 5px 14px; font-size: 12px; cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-dim); transition: all .15s;
    }
    .toolbar .btn:first-child { border-radius: 4px 0 0 4px; }
    .toolbar .btn:last-child { border-radius: 0 4px 4px 0; }
    .toolbar .btn:only-child { border-radius: 4px; }
    .toolbar .btn.active { background: var(--active); color: #1a1b26; border-color: var(--active); }
    .toolbar .btn:hover:not(.active) { color: var(--text); border-color: var(--text-dim); }
    .toolbar .btn-single {
      padding: 5px 14px; font-size: 12px; cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-dim); border-radius: 4px; transition: all .15s;
    }
    .toolbar .btn-single:hover { color: var(--text); border-color: var(--text-dim); }

    /* --- views --- */
    .view { position: fixed; top: 48px; left: 0; right: 0; bottom: 36px; display: none; }
    .view.visible { display: block; }
    #treemap-view { padding: 0; }
    #treemap-chart { width: 100%; height: 100%; }
    #list-view { overflow: auto; padding: 24px; }

    /* --- tree nodes --- */
    .tree-node { margin-left: 0; }
    .tree-node .children { margin-left: 28px; overflow: hidden; transition: max-height .25s ease, opacity .2s ease; }
    .tree-node .children.collapsed { max-height: 0 !important; opacity: 0; }

    .node-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px;
      cursor: pointer; transition: background .12s; user-select: none; margin: 2px 0;
    }
    .node-row:hover { background: rgba(122, 162, 247, 0.08); }

    .node-toggle {
      width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text-dim); flex-shrink: 0; transition: transform .2s;
    }
    .node-toggle.expanded { transform: rotate(90deg); }
    .node-toggle.leaf { visibility: hidden; }

    .node-status {
      width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 10px;
      transition: all .15s;
    }
    .node-status.pending { border: 2px solid var(--pending); background: transparent; }
    .node-status.active { border: 2px solid var(--active); background: rgba(122,162,247,0.25); }
    .node-status.done { border: 2px solid var(--done); background: var(--done); color: #1a1b26; }

    .node-level {
      font-size: 10px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
      font-weight: 600; font-family: monospace;
    }
    .node-level.l1 { background: rgba(187,154,247,0.2); color: #bb9af7; }
    .node-level.l2 { background: rgba(122,162,247,0.2); color: #7aa2f7; }
    .node-level.l3 { background: rgba(158,206,106,0.2); color: #9ece6a; }
    .node-level.l4 { background: rgba(224,175,104,0.2); color: #e0af68; }
    .node-level.l5 { background: rgba(86,95,137,0.2); color: #828bb8; }

    .node-name {
      font-size: 14px; font-weight: 500; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .node-name.done-text { text-decoration: line-through; color: var(--text-dim); }

    .node-desc {
      font-size: 12px; color: var(--text-dim); margin-left: 70px; padding: 2px 10px 6px;
      max-width: 600px; line-height: 1.5;
    }

    /* --- progress bar --- */
    .progress-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 36px;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 100;
    }
    .progress-bar .bar-track {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar .bar-fill {
      height: 100%; background: var(--done); border-radius: 3px; transition: width .3s;
    }
    .progress-bar .bar-label { font-size: 12px; color: var(--text-dim); flex-shrink: 0; min-width: 120px; text-align: right; }
  </style>
</head>
<body>

<div class="toolbar">
  <h1>任务拆解 — {{TITLE}}</h1>
  <div class="legend">
    <span><i style="background:var(--pending);opacity:.5"></i>待做</span>
    <span><i style="background:var(--active)"></i>进行中</span>
    <span><i style="background:var(--done)"></i>完成</span>
  </div>
  <div class="btn-group" id="view-toggle">
    <div class="btn active" data-view="treemap">总览</div>
    <div class="btn" data-view="list">列表</div>
  </div>
  <div class="btn-group" id="depth-toggle">
    <div class="btn" data-depth="2">L2</div>
    <div class="btn active" data-depth="3">L3</div>
    <div class="btn" data-depth="4">L4</div>
    <div class="btn" data-depth="5">L5</div>
  </div>
  <div class="btn-single list-only" id="btn-collapse-all" style="display:none">全部折叠</div>
  <div class="btn-single list-only" id="btn-expand-all" style="display:none">全部展开</div>
</div>

<div class="view visible" id="treemap-view">
  <div id="treemap-chart"></div>
</div>

<div class="view" id="list-view"></div>

<div class="progress-bar">
  <div class="bar-label" id="progress-label">0 / 0 完成</div>
  <div class="bar-track"><div class="bar-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script>
// ========== DATA — 替换此处 ==========
const taskData = {{TASK_DATA}};

// ========== STATE ==========
let currentView = 'treemap';
let expandDepth = 3;
let treemapDepth = 3;
let echartInstance = null;

// ========== TREEMAP ==========
function buildEchartsData(node, maxLevel) {
  const atLimit = node.level >= maxLevel;
  const isLeaf = !node.children || node.children.length === 0;
  if (isLeaf || atLimit) {
    let val = 10;
    if (!isLeaf) val = sumLeafValues(node);
    return { name: node.name, value: val, desc: node.desc || '', status: node.status, level: node.level };
  }
  return {
    name: node.name, desc: node.desc || '', status: node.status, level: node.level,
    children: node.children.map(c => buildEchartsData(c, maxLevel))
  };
}

function sumLeafValues(node) {
  if (!node.children || !node.children.length) return 10;
  return node.children.reduce((s, c) => s + sumLeafValues(c), 0);
}

function renderTreemap() {
  if (!echartInstance) {
    echartInstance = echarts.init(document.getElementById('treemap-chart'));
  }
  const edata = taskData.children.map(c => buildEchartsData(c, treemapDepth));
  echartInstance.setOption({
    tooltip: {
      formatter: function (info) {
        const d = info.data;
        let html = '<div style="font-size:14px;font-weight:600;margin-bottom:4px">' + info.name + '</div>';
        if (d.level) html += '<div style="color:#aaa">L' + d.level + (d.status ? ' · ' + {pending:'待做',active:'进行中',done:'完成'}[d.status] : '') + '</div>';
        if (d.desc) html += '<div style="margin-top:4px;color:#ccc">' + d.desc + '</div>';
        return html;
      }
    },
    series: [{
      type: 'treemap',
      data: edata,
      top: 8, left: 8, right: 8, bottom: 8,
      roam: 'scale',
      nodeClick: 'zoomToNode',
      zoomToNodeRatio: 0.32 * 0.32,
      breadcrumb: {
        show: true, top: 4, left: 'center',
        itemStyle: { color: '#333', borderColor: '#555' },
        emphasis: { itemStyle: { color: '#555' } }
      },
      label: {
        show: true, formatter: '{b}', fontSize: 13, fontWeight: 500,
        color: '#fff', textShadowColor: 'rgba(0,0,0,0.5)', textShadowBlur: 3
      },
      upperLabel: {
        show: true, height: 28, color: '#fff', fontSize: 13, fontWeight: 600,
        backgroundColor: 'transparent', textShadowColor: 'rgba(0,0,0,0.6)', textShadowBlur: 3
      },
      itemStyle: { borderColor: '#1a1a2e', borderWidth: 2, gapWidth: 2 },
      levels: [
        {
          itemStyle: { borderColor: '#0f0f23', borderWidth: 4, gapWidth: 4 },
          upperLabel: { show: true, height: 32, fontSize: 14, fontWeight: 700 },
          color: ['#5470c6','#91cc75','#fac858','#ee6666','#73c0de','#3ba272','#fc8452','#9a60b4']
        },
        {
          itemStyle: { borderColor: 'rgba(255,255,255,0.12)', borderWidth: 2, gapWidth: 2 },
          upperLabel: { show: true, height: 26, fontSize: 12 },
          colorSaturation: [0.35, 0.6], colorAlpha: [0.7, 1]
        },
        {
          itemStyle: { borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1, gapWidth: 1 },
          colorSaturation: [0.3, 0.5], colorAlpha: [0.6, 0.9]
        },
        {
          itemStyle: { borderColor: 'rgba(255,255,255,0.05)', borderWidth: 1, gapWidth: 1 },
          colorSaturation: [0.25, 0.45], colorAlpha: [0.5, 0.85]
        }
      ]
    }]
  }, true);
}

// ========== LIST ==========
function renderList() {
  const container = document.getElementById('list-view');
  container.innerHTML = '';
  container.appendChild(renderNode(taskData, 0));
  updateProgress();
}

function renderNode(node, depth) {
  const el = document.createElement('div');
  el.className = 'tree-node';
  el.dataset.id = node.id;
  const hasChildren = node.children && node.children.length > 0;
  const isExpanded = depth < expandDepth;

  const row = document.createElement('div');
  row.className = 'node-row';

  const toggle = document.createElement('div');
  toggle.className = 'node-toggle' + (hasChildren ? (isExpanded ? ' expanded' : '') : ' leaf');
  toggle.innerHTML = hasChildren ? '&#9654;' : '';

  const status = document.createElement('div');
  status.className = 'node-status ' + node.status;
  if (node.status === 'done') status.innerHTML = '&#10003;';
  if (node.status === 'active') status.innerHTML = '&#9679;';
  status.addEventListener('click', (e) => {
    e.stopPropagation();
    cycleStatus(node);
    renderList();
  });

  const level = document.createElement('span');
  level.className = 'node-level l' + node.level;
  level.textContent = 'L' + node.level;

  const name = document.createElement('span');
  name.className = 'node-name' + (node.status === 'done' ? ' done-text' : '');
  name.textContent = node.name;

  row.appendChild(toggle);
  row.appendChild(status);
  row.appendChild(level);
  row.appendChild(name);

  const toggleExpand = () => {
    if (!hasChildren) return;
    const childrenEl = el.querySelector(':scope > .children');
    const isOpen = !childrenEl.classList.contains('collapsed');
    if (isOpen) {
      childrenEl.classList.add('collapsed');
      toggle.classList.remove('expanded');
    } else {
      childrenEl.classList.remove('collapsed');
      childrenEl.style.maxHeight = childrenEl.scrollHeight + 'px';
      toggle.classList.add('expanded');
    }
  };
  toggle.addEventListener('click', (e) => { e.stopPropagation(); toggleExpand(); });
  row.addEventListener('click', toggleExpand);

  el.appendChild(row);

  if (node.desc) {
    const desc = document.createElement('div');
    desc.className = 'node-desc';
    desc.textContent = node.desc;
    desc.style.display = 'none';
    row.addEventListener('mouseenter', () => desc.style.display = 'block');
    row.addEventListener('mouseleave', () => desc.style.display = 'none');
    el.appendChild(desc);
  }

  if (hasChildren) {
    const childrenEl = document.createElement('div');
    childrenEl.className = 'children' + (isExpanded ? '' : ' collapsed');
    if (isExpanded) childrenEl.style.maxHeight = '9999px';
    node.children.forEach(child => childrenEl.appendChild(renderNode(child, depth + 1)));
    el.appendChild(childrenEl);
  }
  return el;
}

function cycleStatus(node) {
  const order = ['pending', 'active', 'done'];
  node.status = order[(order.indexOf(node.status) + 1) % 3];
  if (node.status === 'done' && node.children) markAll(node.children, 'done');
}
function markAll(nodes, s) { nodes.forEach(n => { n.status = s; if (n.children) markAll(n.children, s); }); }

function countLeaves(node) {
  let t = 0, d = 0;
  (function walk(n) {
    if (!n.children || !n.children.length) { t++; if (n.status === 'done') d++; }
    if (n.children) n.children.forEach(walk);
  })(node);
  return { t, d };
}
function updateProgress() {
  const { t, d } = countLeaves(taskData);
  const pct = t > 0 ? Math.round(d / t * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = d + ' / ' + t + ' 完成 (' + pct + '%)';
}

// ========== VIEW SWITCHING ==========
function switchView(view) {
  currentView = view;
  document.getElementById('treemap-view').classList.toggle('visible', view === 'treemap');
  document.getElementById('list-view').classList.toggle('visible', view === 'list');
  document.querySelectorAll('.list-only').forEach(el => {
    el.style.display = view === 'list' ? 'block' : 'none';
  });
  if (view === 'treemap') {
    setTimeout(() => { renderTreemap(); echartInstance.resize(); }, 50);
  } else {
    renderList();
  }
}

// ========== EVENTS ==========
document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    switchView(btn.dataset.view);
  });
});

document.querySelectorAll('[data-depth]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-depth]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const d = parseInt(btn.dataset.depth);
    expandDepth = d;
    treemapDepth = d;
    if (currentView === 'treemap') {
      renderTreemap();
    } else {
      renderList();
    }
  });
});

document.getElementById('btn-collapse-all').addEventListener('click', () => {
  expandDepth = 1;
  document.querySelectorAll('[data-depth]').forEach(b => b.classList.remove('active'));
  renderList();
});

document.getElementById('btn-expand-all').addEventListener('click', () => {
  expandDepth = 5;
  document.querySelectorAll('[data-depth]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-depth="5"]').classList.add('active');
  renderList();
});

window.addEventListener('resize', () => {
  if (echartInstance && currentView === 'treemap') echartInstance.resize();
});

// ========== INIT ==========
updateProgress();
setTimeout(renderTreemap, 100);
</script>
</body>
</html>
